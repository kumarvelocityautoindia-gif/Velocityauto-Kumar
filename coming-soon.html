<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Launching Soon | Velocity Auto India</title>
<meta name="description" content="Velocity Auto India is launching on 19th March 2026. Genuine OEM luxury car parts for Mercedes, BMW, Audi, Porsche, Bentley, Rolls Royce & more.">
//fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
//cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>

/* ═══════════════════════════════════
   RESET & ROOT
═══════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#003366;
  --gold:#FFD700;
  --gold2:#FFA500;
  --text:#1a1a1a;
  --light:rgba(255,255,255,.08)
}
html{scroll-behavior:smooth}
body{
  font-family:'Montserrat',sans-serif;
  background:#000;
  color:#fff;
  min-height:100vh;
  overflow-x:hidden
}

/* ═══════════════════════════════════
   ANIMATED BACKGROUND
═══════════════════════════════════ */
.bg-wrap{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  z-index:0;
  background:
    linear-gradient(135deg,rgba(0,0,0,.92) 0%,rgba(0,30,70,.88) 50%,rgba(0,0,0,.95) 100%),
    url('https://images.unsplash.com/photo-1544636331-e26879cd4d9b?w=1600&fit=crop') center/cover no-repeat;
}
.bg-wrap::after{
  content:'';
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse at 20% 50%,rgba(0,51,102,.4) 0%,transparent 60%),
             radial-gradient(ellipse at 80% 50%,rgba(255,215,0,.08) 0%,transparent 60%);
}

/* PARTICLES */
.particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;overflow:hidden}
.particle{position:absolute;border-radius:50%;animation:float linear infinite;opacity:0}
@keyframes float{
  0%{transform:translateY(100vh) rotate(0deg);opacity:0}
  10%{opacity:.6}
  90%{opacity:.3}
  100%{transform:translateY(-100px) rotate(720deg);opacity:0}
}

/* GOLD LINES */
.gold-line{
  position:fixed;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,215,0,.3),transparent);
  width:100%;
  left:0;
  z-index:1;
  animation:shimmer 4s ease-in-out infinite
}
.gold-line:nth-child(1){top:25%}
.gold-line:nth-child(2){top:75%;animation-delay:2s}
@keyframes shimmer{0%,100%{opacity:.2}50%{opacity:.8}}

/* ═══════════════════════════════════
   HEADER
═══════════════════════════════════ */
header{
  position:fixed;
  top:0;width:100%;
  z-index:100;
  padding:20px 50px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:linear-gradient(180deg,rgba(0,0,0,.7),transparent);
}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-icon{font-size:28px}
.logo-text{font-family:'Playfair Display',serif;font-size:20px;font-weight:800;background:linear-gradient(135deg,#fff,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:1px}
.header-back{
  color:rgba(255,255,255,.7);
  font-size:13px;
  font-weight:600;
  display:flex;
  align-items:center;
  gap:8px;
  text-decoration:none;
  transition:color .3s;
  text-transform:uppercase;
  letter-spacing:1px
}
.header-back:hover{color:var(--gold)}

/* ═══════════════════════════════════
   MAIN CONTENT
═══════════════════════════════════ */
.cs-main{
  position:relative;
  z-index:10;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:100px 40px 60px
}

/* LAUNCH LABEL */
.launch-label{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:rgba(255,215,0,.1);
  border:1px solid rgba(255,215,0,.3);
  color:var(--gold);
  padding:8px 22px;
  border-radius:30px;
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:2px;
  margin-bottom:28px;
  animation:pulse-label 2.5s ease-in-out infinite
}
.launch-label .dot{width:7px;height:7px;background:var(--gold);border-radius:50%;animation:blink-dot 1.2s infinite}
@keyframes pulse-label{0%,100%{box-shadow:0 0 0 rgba(255,215,0,0)}50%{box-shadow:0 0 20px rgba(255,215,0,.2)}}
@keyframes blink-dot{0%,100%{opacity:1}50%{opacity:.2}}

/* ANNOUNCEMENT */
.announce-badge{
  background:linear-gradient(135deg,rgba(255,215,0,.15),rgba(255,165,0,.1));
  border:1px solid rgba(255,215,0,.4);
  border-radius:12px;
  padding:16px 30px;
  margin-bottom:30px;
  display:inline-block;
  animation:fadeInDown .8s ease forwards
}
.announce-badge p{
  font-size:15px;
  font-weight:600;
  color:rgba(255,255,255,.9);
  letter-spacing:.5px
}
.announce-badge strong{color:var(--gold);font-size:16px}
@keyframes fadeInDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}

/* HEADLINE */
.cs-headline{
  font-family:'Playfair Display',serif;
  font-size:62px;
  font-weight:900;
  line-height:1.1;
  margin-bottom:20px;
  animation:fadeInUp .9s ease .1s forwards;
  opacity:0
}
.cs-headline .line1{display:block;color:#fff;text-shadow:0 4px 20px rgba(0,0,0,.5)}
.cs-headline .line2{
  display:block;
  background:linear-gradient(135deg,var(--gold),var(--gold2),var(--gold));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  background-size:200%;
  animation:goldShine 3s ease-in-out infinite,fadeInUp .9s ease .1s forwards
}
@keyframes goldShine{0%{background-position:0%}50%{background-position:100%}100%{background-position:0%}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(25px)}to{opacity:1;transform:translateY(0)}}

/* SUBTITLE */
.cs-sub{
  font-size:16px;
  color:rgba(255,255,255,.65);
  max-width:560px;
  margin:0 auto 40px;
  line-height:1.7;
  animation:fadeInUp .9s ease .2s forwards;
  opacity:0
}

/* ═══ LAUNCH DATE BOX ═══ */
.launch-date-box{
  background:linear-gradient(135deg,rgba(255,215,0,.12),rgba(255,215,0,.05));
  border:2px solid rgba(255,215,0,.4);
  border-radius:16px;
  padding:20px 40px;
  margin-bottom:44px;
  display:inline-block;
  animation:fadeInUp .9s ease .3s forwards;
  opacity:0;
  position:relative;
  overflow:hidden
}
.launch-date-box::before{
  content:'🕉️';
  position:absolute;
  top:-10px;
  right:15px;
  font-size:28px;
  opacity:.4
}
.launch-date-box .date-label{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.5);margin-bottom:6px}
.launch-date-box .date-main{font-family:'Playfair Display',serif;font-size:32px;font-weight:800;color:var(--gold);letter-spacing:1px}
.launch-date-box .date-sub{font-size:12px;color:rgba(255,255,255,.55);margin-top:4px;font-style:italic}

/* ═══ COUNTDOWN ═══ */
.countdown-wrap{
  margin-bottom:50px;
  animation:fadeInUp .9s ease .4s forwards;
  opacity:0
}
.countdown-label{font-size:11px;text-transform:uppercase;letter-spacing:2.5px;color:rgba(255,255,255,.45);margin-bottom:20px}
.countdown{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.cd-box{
  display:flex;
  flex-direction:column;
  align-items:center;
  min-width:90px
}
.cd-num{
  font-family:'Playfair Display',serif;
  font-size:58px;
  font-weight:900;
  color:#fff;
  line-height:1;
  background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(0,51,102,.3));
  border:1px solid rgba(255,215,0,.25);
  border-radius:14px;
  width:90px;
  height:90px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
  box-shadow:0 8px 30px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.1);
  transition:all .3s
}
.cd-num::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:50%;
  background:rgba(255,255,255,.04);
  border-radius:14px 14px 0 0
}
.cd-num.flip{animation:flip .4s ease}
@keyframes flip{0%{transform:rotateX(0)}50%{transform:rotateX(-15deg);color:var(--gold)}100%{transform:rotateX(0)}}
.cd-unit{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:rgba(255,215,0,.7);margin-top:10px}
.cd-sep{font-size:40px;color:rgba(255,215,0,.4);align-self:center;margin-bottom:20px;font-weight:300}

/* ═══ BRAND ICONS ROW ═══ */
.brands-row{
  display:flex;
  gap:14px;
  justify-content:center;
  flex-wrap:wrap;
  margin-bottom:44px;
  animation:fadeInUp .9s ease .5s forwards;
  opacity:0
}
.brand-chip{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.75);
  padding:7px 16px;
  border-radius:24px;
  font-size:11px;
  font-weight:600;
  letter-spacing:.5px;
  transition:all .3s;
  cursor:default
}
.brand-chip:hover{background:rgba(255,215,0,.12);border-color:rgba(255,215,0,.4);color:var(--gold)}

/* ═══ EMAIL CAPTURE ═══ */
.notify-wrap{
  margin-bottom:44px;
  animation:fadeInUp .9s ease .6s forwards;
  opacity:0
}
.notify-label{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:14px;font-weight:500}
.notify-form{display:flex;gap:0;max-width:460px;margin:0 auto;border-radius:8px;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,.3);border:1px solid rgba(255,215,0,.25)}
.notify-form input{flex:1;padding:14px 20px;background:rgba(255,255,255,.05);border:none;color:#fff;font-size:14px;font-family:'Montserrat',sans-serif;outline:none}
.notify-form input::placeholder{color:rgba(255,255,255,.35)}
.notify-form button{background:var(--gold);color:var(--navy);padding:14px 22px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:'Montserrat',sans-serif;transition:all .3s;white-space:nowrap}
.notify-form button:hover{background:#fff}
.notify-success{display:none;color:var(--gold);font-size:13px;font-weight:600;margin-top:10px}

/* ═══ ACTION BUTTONS ═══ */
.cs-actions{
  display:flex;
  gap:16px;
  justify-content:center;
