<!DOCTYPE html>
<html>
<head>
    <title>Contact Velocity Auto India</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .form-container { max-width: 500px; margin: auto; background: #f9f9f9; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; width: 100%; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Inquiry for Luxury Car Parts</h2>
        <p>Fill out the form below and we will get back to you shortly.</p>
        
        <form action="https://formspree.io/f/mjgaaaee" method="POST">
            <label>Your Name:</label>
            <input type="text" name="name" placeholder="Enter your name" required>
            
            <label>Your Email:</label>
            <input type="email" name="_replyto" placeholder="Enter your email" required>
<input type="hidden" name="_next" value="https://kumarvelocityautoindia-gif.github.io/Velocityauto-Kumar/index.html">
            
            <label>Car Model & Part Needed:</label>
            <textarea name="message" rows="5" placeholder="Example: 2022 Bentley Continental GT Front Bumper" required></textarea>
            
            <button type="submit">Send Inquiry</button>
        </form>
    </div>

</body>
</html>
