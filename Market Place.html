<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace | Velocity Auto India – Luxury OEM Parts</title>
<meta name="description" content="Shop genuine OEM parts for Mercedes-Benz, BMW, Audi, Porsche, Bentley, Rolls Royce, Ferrari & more. VIN-matched, UK/EU sourced, India delivered.">
//fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
//cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#003366;
  --gold:#FFD700;
  --silver:#C0C0C0;
  --dark:#0a0a0a;
  --text:#1a1a1a;
  --light:#f7f8fa;
  --border:#e8edf2;
  --shadow:0 8px 32px rgba(0,0,0,.12);
  --glow:0 0 20px rgba(255,215,0,.3)
}
html{scroll-behavior:smooth}
body{font-family:'Montserrat',sans-serif;color:var(--text);background:#fff;overflow-x:hidden}
h1,h2,h3,h4{font-family:'Playfair Display',serif;font-weight:700}
a{text-decoration:none;transition:all .3s}

/* ═══ HEADER ═══ */
header{position:fixed;top:0;width:100%;z-index:1000;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);box-shadow:0 2px 20px rgba(0,0,0,.08);border-bottom:2px solid rgba(255,215,0,.3)}
.nav-container{max-width:1280px;margin:0 auto;padding:14px 40px;display:flex;justify-content:space-between;align-items:center}
.logo{display:flex;align-items:center;gap:10px;font-size:21px;font-weight:700;color:var(--navy)}
.logo-icon{font-size:26px}
.logo span{font-family:'Playfair Display',serif;background:linear-gradient(135deg,var(--navy),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
nav ul{display:flex;list-style:none;gap:32px;align-items:center}
nav a{font-size:13px;font-weight:600;color:var(--text);position:relative;padding-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
nav a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:2px;background:var(--gold);transition:width .3s}
nav a:hover::after,nav a.active::after{width:100%}
nav a.active{color:var(--navy)}
.nav-cta{background:var(--navy);color:#fff !important;padding:9px 20px;border-radius:6px;font-size:12px !important}
.nav-cta:hover{background:var(--gold);color:var(--navy) !important}
.nav-cta::after{display:none !important}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none}
.hamburger span{width:24px;height:2px;background:var(--navy);border-radius:2px;transition:all .3s;display:block}

/* ═══ TICKER ═══ */
.ticker-wrap{background:var(--navy);padding:9px 0;overflow:hidden;border-bottom:2px solid var(--gold)}
.ticker{display:flex;animation:ticker 30s linear infinite;white-space:nowrap}
.ticker:hover{animation-play-state:paused}
.ticker-item{padding:0 40px;font-size:12px;font-weight:600;color:rgba(255,255,255,.85);text-transform:uppercase;letter-spacing:1.5px}
.ticker-item .dot{color:var(--gold);margin:0 8px}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* ═══ BRAND NAV BAR ═══ */
.brand-nav{background:linear-gradient(135deg,#001a3d,#003366);border-bottom:3px solid var(--gold);position:sticky;top:66px;z-index:900;overflow:hidden}
.brand-nav-inner{max-width:1280px;margin:0 auto;display:flex;justify-content:center;flex-wrap:wrap}
.brand-nav a{
  color:rgba(255,255,255,.75);
  font-size:11px;
  font-weight:700;
  letter-spacing:1.2px;
  padding:13px 16px;
  text-decoration:none;
  font-family:'Montserrat',sans-serif;
  transition:all .25s;
  border-right:1px solid rgba(255,255,255,.08);
  text-transform:uppercase;
  position:relative;
  display:flex;
  align-items:center;
  gap:6px
}
.brand-nav a::before{content:'';position:absolute;bottom:0;left:0;width:0;height:3px;background:var(--gold);transition:width .3s}
.brand-nav a:hover{color:#fff;background:rgba(255,215,0,.1)}
.brand-nav a:hover::before{width:100%}
.brand-nav a .brand-flag{font-size:14px}
@media(max-width:768px){
  .brand-nav-inner{flex-wrap:nowrap;overflow-x:auto;justify-content:flex-start;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .brand-nav-inner::-webkit-scrollbar{display:none}
  .brand-nav a{padding:11px 13px;font-size:10px;white-space:nowrap}
}

/* ═══ HERO ═══ */
.mp-hero{background:linear-gradient(135deg,rgba(0,10,30,.92) 0%,rgba(0,51,102,.85) 100%),url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=1600&fit=crop')center/cover no-repeat;padding:120px 40px 70px;text-align:center;color:#fff;margin-top:66px}
.mp-hero h1{font-size:46px;color:#fff;margin-bottom:14px;text-shadow:0 4px 16px rgba(0,0,0,.4)}
.mp-hero h1 span{color:var(--gold)}
.mp-hero p{font-size:16px;color:rgba(255,255,255,.78);max-width:580px;margin:0 auto 28px}
.hero-search{display:flex;gap:0;max-width:520px;margin:0 auto;border-radius:8px;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,.3)}
.hero-search input{flex:1;padding:15px 22px;border:none;font-size:14px;font-family:'Montserrat',sans-serif;outline:none;background:rgba(255,255,255,.97)}
.hero-search button{background:var(--gold);color:var(--navy);padding:15px 26px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:'Montserrat',sans-serif;transition:all .3s;white-space:nowrap}
.hero-search button:hover{background:#fff}
.hero-stats{display:flex;justify-content:center;gap:40px;margin-top:36px;flex-wrap:wrap}
.hero-stat strong{display:block;font-size:26px;color:var(--gold);font-family:'Playfair Display',serif}
.hero-stat span{font-size:11px;color:rgba(255,255,255,.65);text-transform:uppercase;letter-spacing:1px}

/* ═══ TRUST BAR ═══ */
.trust-bar{background:#fff;border-bottom:1px solid var(--border);padding:20px 40px}
.trust-inner{max-width:1280px;margin:0 auto;display:flex;justify-content:center;gap:50px;flex-wrap:wrap}
.trust-item{display:flex;align-items:center;gap:10px}
.trust-item i{font-size:20px;color:var(--gold)}
.trust-item strong{font-size:13px;color:var(--navy);font-weight:700;display:block}
.trust-item span{font-size:11px;color:#999}

/* ═══ MAIN CONTAINER ═══ */
.mp-main{max-width:1280px;margin:0 auto;padding:50px 40px}

/* ═══ BRAND SECTION ═══ */
.brand-section{margin-bottom:80px;scroll-margin-top:140px}
.brand-header{display:flex;align-items:center;gap:18px;margin-bottom:32px;padding:20px 24px;background:linear-gradient(135deg,var(--navy),#001a3d);border-radius:12px;position:relative;overflow:hidden}
.brand-header::before{content:'';position:absolute;top:0;right:0;width:200px;height:100%;background:linear-gradient(90deg,transparent,rgba(255,215,0,.08));pointer-events:none}
.brand-header-icon{font-size:38px;flex-shrink:0}
.brand-header-info h2{font-family:'Playfair Display',serif;font-size:28px;color:#fff;margin-bottom:4px}
.brand-header-info p{font-size:12px;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:1px}
.brand-part-badge{margin-left:auto;background:rgba(255,215,0,.15);border:1px solid rgba(255,215,0,.3);color:var(--gold);padding:6px 16px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap}
.brand-header-line{position:absolute;bottom:0;left:0;height:3px;width:100%;background:linear-gradient(90deg,var(--gold),transparent)}

/* ═══ PARTS GRID ═══ */
.parts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px}

.part-card{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:all .35s;position:relative;cursor:pointer}
.part-card:hover{box-shadow:0 12px 40px rgba(0,51,102,.15);transform:translateY(-6px);border-color:rgba(255,215,0,.5)}
.part-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--navy),var(--gold));opacity:0;transition:opacity .3s}
.part-card:hover::before{opacity:1}

.card-badge-wrap{position:absolute;top:12px;left:12px;z-index:2;display:flex;flex-direction:column;gap:5px}
.cbadge{padding:4px 11px;border-radius:14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.cbadge-oem{background:var(--navy);color:#fff}
.cbadge-hot{background:#e74c3c;color:#fff}
.cbadge-new{background:#27ae60;color:#fff}
.cbadge-sale{background:var(--gold);color:var(--navy)}
.cbadge-rare{background:#8e44ad;color:#fff}

.card-img{height:180px;background:linear-gradient(135deg,#eef2f7,#dde4ed);display:flex;align-items:center;justify-content:center;font-size:60px;overflow:hidden;position:relative}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.part-card:hover .card-img img{transform:scale(1.06)}
.card-img-overlay{position:absolute;bottom:0;left:0;right:0;height:40px;background:linear-gradient(transparent,rgba(0,51,102,.08))}

.card-body{padding:18px}
.card-brand-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);margin-bottom:5px;display:flex;align-items:center;gap:5px}
.card-title{font-family:'Playfair Display',serif;font-size:16px;color:var(--navy);margin-bottom:6px;line-height:1.3}
.card-sku{font-size:10px;color:#aaa;font-family:'Courier New',monospace;background:var(--light);padding:3px 8px;border-radius:4px;display:inline-block;margin-bottom:10px}
.card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.ctag{font-size:10px;padding:3px 9px;background:rgba(0,51,102,.06);color:var(--navy);border-radius:10px;font-weight:500}

.card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--border)}
.price-wrap{}
.card-price{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:var(--navy)}
.card-price-orig{font-size:11px;color:#bbb;text-decoration:line-through;margin-left:4px}
.price-save{font-size:10px;color:#27ae60;font-weight:700;display:block;margin-top:1px}
.card-actions{display:flex;gap:6px}
.btn-eq{background:var(--navy);color:#fff;padding:8px 14px;border-radius:6px;font-size:11px;font-weight:700;border:none;cursor:pointer;font-family:'Montserrat',sans-serif;transition:all .3s}
